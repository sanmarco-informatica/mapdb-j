/*
 * This file was generated by the Gradle 'init' task.
 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'org.jetbrains.kotlin.jvm'
}

repositories {
    mavenCentral()
}

dependencies {
    api libs.org.jetbrains.kotlin.kotlin.stdlib
    api libs.org.eclipse.collections.eclipse.collections.api
    api libs.org.eclipse.collections.eclipse.collections
    api libs.org.eclipse.collections.eclipse.collections.forkjoin
    api libs.net.jpountz.lz4.lz4
    api libs.org.mapdb.elsa
    api libs.com.google.guava.guava
    compileOnly "org.jspecify:jspecify:1.0.0"
    testImplementation libs.junit.junit
    testImplementation libs.org.eclipse.collections.eclipse.collections.testutils
    testImplementation libs.org.easytesting.fest.assert
    testImplementation libs.org.easytesting.fest.reflect
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
}

group = 'it.smi'
version = '4.0.0-SNAPSHOT'
description = 'mapdb-j'

java {
    withSourcesJar()
}

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
kotlin {
    jvmToolchain(8)
}
